<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheetah Pro | Workspace</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #0f172a;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(226, 232, 240, 0.8);
            --focus-ring: rgba(79, 70, 229, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Changed to flex-start para di ma-cut pag humaba */
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .workspace {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 520px;
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid var(--border);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        h2 {
            margin: 0;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 400;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .file-upload-box:hover {
            border-color: #4f46e5;
            background: #eef2ff;
            color: #4f46e5;
        }

        #tpl {
            display: none;
        }

        textarea {
            width: 100%;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            height: 180px;
            resize: none;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        button.primary-btn {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        button.primary-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.3);
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 20px;
            min-height: 22px;
            transition: color 0.3s ease;
        }

        /* --- EMAIL SNIPPETS STYLES --- */
        .email-section {
            display: none;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            animation: slideUp 0.5s ease;
        }

        .copy-group {
            margin-bottom: 20px;
        }

        .copy-group label {
            color: #4f46e5;
        }

        .copy-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 8px;
        }

        .copy-box input, .copy-box textarea {
            background: transparent;
            border: none;
            width: 100%;
            font-size: 0.85rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: auto;
            resize: none;
        }
        
        .copy-box input:focus, .copy-box textarea:focus {
            outline: none;
            box-shadow: none;
        }

        .copy-btn {
            background: #e2e8f0;
            color: #475569;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #cbd5e1;
            color: #0f172a;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

    </style>
</head>
<body>

<div class="workspace">
    <div class="header">
        <h2>Cheetah Pro</h2>
        <div class="subtitle">Client Document Generator</div>
    </div>

    <label>1. Application Form</label>
    <div class="file-upload-wrapper">
        <input type="file" id="tpl" accept=".docx">
        <label for="tpl" class="file-upload-box" id="upload-label">
            📄 Upload Template (Contact Pat for Template)
        </label>
    </div>

    <label>2. Client Information Block</label>
    <textarea id="raw" placeholder="Paste full client format here..."></textarea>

    <button class="primary-btn" onclick="handleGenerate()">Generate Application</button>
    <div id="status"></div>

    <div class="email-section" id="emailSection">
        <div class="header" style="margin-bottom: 20px;">
            <h2 style="font-size: 1.3rem;">📋 Email Snippets</h2>
            <div class="subtitle">Ready to copy-paste</div>
        </div>

        <div class="copy-group">
            <label>Email Subject</label>
            <div class="copy-box">
                <input type="text" id="snip-subject" readonly>
                <button class="copy-btn" onclick="copyText('snip-subject')">Copy</button>
            </div>
        </div>

        <div class="copy-group">
            <label>Short Format (Name / Municipality)</label>
            <div class="copy-box">
                <input type="text" id="snip-short" readonly>
                <button class="copy-btn" onclick="copyText('snip-short')">Copy</button>
            </div>
        </div>

        <div class="copy-group">
            <label>Email Body Options</label>
            <div class="options-grid">
                <div class="copy-box">
                    <textarea id="snip-body1" rows="3" readonly></textarea>
                    <button class="copy-btn" onclick="copyText('snip-body1')">Copy</button>
                </div>
                <div class="copy-box">
                    <textarea id="snip-body2" rows="3" readonly></textarea>
                    <button class="copy-btn" onclick="copyText('snip-body2')">Copy</button>
                </div>
                <div class="copy-box">
                    <textarea id="snip-body3" rows="3" readonly></textarea>
                    <button class="copy-btn" onclick="copyText('snip-body3')">Copy</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('tpl').addEventListener('change', function(e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : "📄 Upload SKYLINE.docx Template";
        document.getElementById('upload-label').innerText = fileName;
        
        if (e.target.files[0]) {
            document.getElementById('upload-label').style.borderColor = "#4f46e5";
            document.getElementById('upload-label').style.color = "#4f46e5";
            document.getElementById('upload-label').style.background = "#eef2ff";
        }
    });

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function getFormattedDate() {
        const today = new Date();
        return today.toLocaleDateString('en-US', { 
            year: 'numeric', month: 'long', day: 'numeric' 
        });
    }

    // --- SMART PARSER ---
    function parseData(rawText) {
        const lines = rawText.split('\n');
        const data = {};
        let currentKey = "";

        for (let line of lines) {
            line = line.trim();
            if (!line) continue; 
            
            if (line.startsWith('(')) continue;

            const colonIndex = line.indexOf(':');
            
            if (colonIndex !== -1) {
                currentKey = line.substring(0, colonIndex).trim().toUpperCase();
                const value = line.substring(colonIndex + 1).trim();
                data[currentKey] = value;
            } else if (currentKey) {
                data[currentKey] = data[currentKey] ? data[currentKey] + " " + line : line;
            }
        }
        return data;
    }

    // --- COPY FUNCTION ---
    function copyText(elementId) {
        const copyText = document.getElementById(elementId);
        copyText.select();
        copyText.setSelectionRange(0, 99999); // For mobile devices
        navigator.clipboard.writeText(copyText.value);
        
        // Visual feedback
        const btn = event.target;
        const originalText = btn.innerText;
        btn.innerText = "Copied!";
        btn.style.background = "#10b981";
        btn.style.color = "white";
        
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#e2e8f0";
            btn.style.color = "#475569";
        }, 1500);
    }

    function handleGenerate() {
        const status = document.getElementById('status');
        const tFile = document.getElementById('tpl').files[0];
        const rawText = document.getElementById('raw').value;

        if (!tFile || !rawText) {
            status.innerHTML = "⚠️ Please upload template and paste data.";
            status.style.color = "#ef4444";
            return;
        }

        status.innerHTML = "Processing document...";
        status.style.color = "#4f46e5";
        document.getElementById('emailSection').style.display = "none";

        setTimeout(() => processDocument(tFile, rawText, status), 50);
    }

    async function processDocument(tFile, rawText, status) {
        try {
            const tBuf = await getBuf(tFile);
            const zip = new PizZip(tBuf);

            const doc = new window.docxtemplater(zip, {
                paragraphLoop: true,
                linebreaks: true
            });

            const clientData = parseData(rawText);

            function get(key, isEmail = false) {
                let val = clientData[key.toUpperCase()] || "";
                return isEmail ? val : val.toUpperCase();
            }

            // Map all data
            doc.render({
                date: getFormattedDate().toUpperCase(), 
                last_name: get("LAST NAME"),
                first_name: get("FIRST NAME"),
                middle_name: get("MIDDLE NAME"),
                hp: get("HOUSE PHONE"),
                op: get("OFFICE PHONE"),
                mobile: get("MOBILE PHONE"),
                email: get("EMAIL ADDRESS", true), 
                id_no: get("ID TYPE/NO."), 
                
                birthdate: get("BIRTHDATE"),
                age: get("AGE"),
                sex: get("SEX"),
                civil_status: get("CIVIL STATUS"),
                spouse_name: get("SPOUSE NAME"),
                
                house_no: get("HOUSE/BLOCK/UNIT NO."),
                street: get("STREET"),
                building: get("BUILDING"),
                subd: get("DISTRICT/SUBDIVISION"),
                barangay: get("BARANGAY"),
                municipality: get("MUNICIPALITY"),
                
                occupation: get("OCCUPATION/POSITION"),
                employer: get("EMPLOYER"), 
                occ_address: get("ADDRESS"),
                spouse_occ: get("SPOUSE OCCUPATION"),
                spouse_emp: get("SPOUSE EMPLOYER"),
                spouse_add_occ: get("SPOUSE EMPLOYER ADDRESS"),

                plan_name: get("PLAN"),
                plan_value: get("PLAN VALUE")
            });

            const out = doc.getZip().generate({ 
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            // Smart Variables for Snippets
            const lName = get("LAST NAME") || "UNKNOWN";
            const fName = get("FIRST NAME") || "CLIENT";
            const muni = get("MUNICIPALITY") || "NO_CITY";
            const plan = get("PLAN") || "NO_PLAN";

            // Generate File
            const fileName = `${lName}, ${fName} - ${muni}.docx`;
            saveAs(out, fileName);

            // --- POPULATE EMAIL SNIPPETS ---
            document.getElementById('snip-subject').value = `${lName}, ${fName} - ${muni} - ${plan}`;
            document.getElementById('snip-short').value = `${lName}, ${fName} / ${muni}`;
            
            // Option 1: Friendly Taglish
            document.getElementById('snip-body1').value = `Magandang araw po!\n\nAttached herewith is the completed application form for ${fName} ${lName}. Let me know po if you need anything else.\n\nSalamat!`;
            
            // Option 2: Formal English
            document.getElementById('snip-body2').value = `Good day,\n\nPlease find attached the application details and requirements for ${fName} ${lName} (${plan}) for your perusal.\n\nThank you and best regards,`;
            
            // Option 3: Short & Direct
            document.getElementById('snip-body3').value = `Good day!\n\nSending over the generated application document for ${lName}, ${fName} from ${muni}.\n\nThank you.`;

            // Show Section
            document.getElementById('emailSection').style.display = "block";

            status.innerHTML = "✨ Application successfully generated!";
            status.style.color = "#10b981";

            document.getElementById('raw').value = "";
            
        } catch (err) {
            console.error(err);
            status.innerHTML = "❌ An error occurred. Check the console.";
            status.style.color = "#ef4444";
        }
    }
</script>

</body>
</html>
