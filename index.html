<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHEETAH PRO 2026 | RELIABLE ENGINE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

    <style>
        :root { --neon: #00ff9d; --bg: #0a0a0c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; background: #141417; padding: 35px; border-radius: 15px; border: 1px solid #2a2a30; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .status-bar { background: rgba(0, 255, 157, 0.05); border: 1px solid rgba(0, 255, 157, 0.2); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; margin-bottom: 25px; color: var(--neon); }
        textarea { width: 100%; height: 140px; background: #000; border: 1px solid #333; color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        button { width: 100%; padding: 18px; background: var(--neon); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); transform: translateY(-2px); }
        label { display: block; margin-bottom: 5px; font-size: 0.75rem; color: #888; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--neon); margin-top: 0;">CHEETAH PRO 🐆</h2>
    <div id="status" class="status-bar">SYSTEM_READY | MARCH 16, 2026</div>

    <label>1. TEMPLATE (SKYLINE - Copy.docx)</label>
    <input type="file" id="tpl" style="margin-bottom: 20px;">

    <label>2. CLIENT DATA BLOCK</label>
    <textarea id="raw" placeholder="PASTE DATA HERE..."></textarea>

    <div class="grid">
        <div>
            <label>LOCATION SKETCH</label>
            <input type="file" id="sk">
        </div>
        <div>
            <label>SIGNATURE</label>
            <input type="file" id="si">
        </div>
    </div>

    <button onclick="runExecution()">Generate Document</button>
</div>

<script>
    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "---";
    }

    async function runExecution() {
        const status = document.getElementById('status');
        const tFile = document.getElementById('tpl').files[0];
        const raw = document.getElementById('raw').value;
        const skFile = document.getElementById('sk').files[0];
        const siFile = document.getElementById('si').files[0];

        if (!tFile || !raw) return alert("Paki-upload ang template at i-paste ang data!");

        try {
            status.innerText = "⚙️ INITIALIZING_RELIABLE_ENGINE...";
            
            const tBuf = await getBuf(tFile);
            const skBuf = await getBuf(skFile);
            const siBuf = await getBuf(siFile);

            const zip = new PizZip(tBuf);

            // Gagamit tayo ng CUSTOM DELIMITERS '+++' para sa template mo
            const imgOptions = {
                centered: false,
                getImage: (tagValue) => tagValue,
                getSize: (img, tagValue, tagName) => {
                    if (tagName === "sketch") return [450, 250];
                    if (tagName === "signature") return [160, 80];
                    return [100, 100];
                }
            };

            // Sigurado tayong window.docxtemplater ang tawag dito
            const doc = new window.docxtemplater(zip, {
                modules: [new window.ImageModule(imgOptions)],
                delimiters: { start: '+++', end: '+++' }, // Para sa +++sketch+++ tags mo
                paragraphLoop: true,
                linebreaks: true
            });

            doc.render({
                last_name: extract(raw, "LAST NAME"),
                first_name: extract(raw, "FIRST NAME"),
                middle_name: extract(raw, "MIDDLE NAME"),
                mobile: extract(raw, "MOBILE PHONE"),
                email: extract(raw, "EMAIL ADDRESS"),
                id_no: extract(raw, "ID TYPE/NO."),
                house_no: extract(raw, "HOUSE/BLOCK/UNIT NO."),
                street: extract(raw, "STREET"),
                barangay: extract(raw, "BARANGAY"),
                municipality: extract(raw, "MUNICIPALITY"),
                date: "March 16, 2026",
                sketch: skBuf,      // Magiging +++sketch+++
                signature: siBuf    // Magiging +++signature+++
            });

            const out = doc.getZip().generate({ 
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            saveAs(out, `SKYLINE_APP_${extract(raw, "LAST NAME")}.docx`);
            status.innerText = "✅ SUCCESS: FILE_DOWNLOADED";

        } catch (err) {
            console.error(err);
            status.innerText = "❌ ERROR: " + err.message;
            alert("Error: " + err.message);
        }
    }
</script>
</body>
</html>
