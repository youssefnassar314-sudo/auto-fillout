<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CHEETAH PRO | THE MAGIC FIX 🐆</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

    <style>
        :root { --neon: #00ff9d; --bg: #0a0a0c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #eee; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 650px; background: #141417; padding: 35px; border-radius: 15px; border: 1px solid #2a2a30; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .status-bar { background: rgba(0, 255, 157, 0.05); border: 1px solid rgba(0, 255, 157, 0.2); padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.8rem; margin-bottom: 25px; color: var(--neon); }
        textarea { width: 100%; height: 160px; background: #000; border: 1px solid #333; color: #00ff9d; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; box-sizing: border-box; outline: none; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        button { width: 100%; padding: 20px; background: var(--neon); color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { box-shadow: 0 0 25px rgba(0, 255, 157, 0.5); transform: translateY(-2px); }
        label { display: block; margin-bottom: 8px; font-size: 0.75rem; color: #888; font-weight: bold; text-transform: uppercase; }
        input[type="file"] { font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--neon); margin: 0 0 10px 0;">CHEETAH PRO OS 🐆</h2>
    <div id="status" class="status-bar">SYSTEM_READY // MIXED TAGS FIXED</div>

    <label>1. Application Template (SKYLINE.docx)</label>
    <input type="file" id="tpl" style="margin-bottom: 25px;">

    <label>2. Paste Client Data Block</label>
    <textarea id="raw" placeholder="PASTE DATA HERE..."></textarea>

    <div class="grid">
        <div style="background: #1c1c21; padding: 10px; border-radius: 8px;">
            <label>Location Sketch</label>
            <input type="file" id="sk">
        </div>
        <div style="background: #1c1c21; padding: 10px; border-radius: 8px;">
            <label>Signature</label>
            <input type="file" id="si">
        </div>
    </div>

    <button onclick="runCheetahEngine()">Execute & Download DOCX</button>
</div>

<script>
    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "---";
    }

    async function runCheetahEngine() {
        const status = document.getElementById('status');
        const tFile = document.getElementById('tpl').files[0];
        const rawText = document.getElementById('raw').value;
        const skFile = document.getElementById('sk').files[0];
        const siFile = document.getElementById('si').files[0];

        if (!tFile || !rawText) return alert("Missing Template or Client Data!");

        try {
            status.innerText = "⚙️ ALIGNING_TEMPLATE_TAGS...";
            status.style.color = "#00d4ff";

            const tBuf = await getBuf(tFile);
            const skBuf = await getBuf(skFile);
            const siBuf = await getBuf(siFile);

            const zip = new PizZip(tBuf);

            // --- THE MAGIC HACK ---
            // Papalitan natin ang +++sketch+++ ng {%sketch} sa loob mismo ng file
            // para mabasa siya ng Image Module nang tama, habang naiiwan ang {last_name}
            let docXml = zip.file("word/document.xml").asText();
            docXml = docXml.replace(/\+\+\+sketch\+\+\+/g, "{%sketch}");
            docXml = docXml.replace(/\+\+\+signature\+\+\+/g, "{%signature}");
            zip.file("word/document.xml", docXml);
            // ----------------------

            const imgOptions = {
                centered: false,
                getImage: (tagValue) => tagValue,
                getSize: (img, tagValue, tagName) => {
                    if (tagName === "sketch") return [450, 250];
                    if (tagName === "signature") return [160, 80];
                    return [100, 100];
                }
            };

            // HINDI na natin babaguhin ang delimiters, default { } na lang ang gamit
            const doc = new window.docxtemplater(zip, {
                modules: [new window.ImageModule(imgOptions)],
                paragraphLoop: true,
                linebreaks: true
            });

            doc.render({
                date: "March 16, 2026",
                last_name: extract(rawText, "LAST NAME"),
                first_name: extract(rawText, "FIRST NAME"),
                middle_name: extract(rawText, "MIDDLE NAME"),
                mobile: extract(rawText, "MOBILE PHONE"),
                email: extract(rawText, "EMAIL ADDRESS"),
                id_no: extract(rawText, "ID TYPE/NO."),
                house_no: extract(rawText, "HOUSE/BLOCK/UNIT NO."),
                street: extract(rawText, "STREET"),
                barangay: extract(rawText, "BARANGAY"),
                municipality: extract(rawText, "MUNICIPALITY"),
                sketch: skBuf,
                signature: siBuf
            });

            const out = doc.getZip().generate({ 
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            const clientName = extract(rawText, "LAST NAME") || "NewClient";
            saveAs(out, `SKYLINE_${clientName}.docx`);

            status.innerText = "✅ SUCCESS: FULL_DOCUMENT_GENERATED";
            status.style.color = "var(--neon)";

        } catch (err) {
            console.error(err);
            status.innerText = "❌ ERROR: " + err.message;
            status.style.color = "#ff4d4d";
            alert("Engine Error: " + err.message);
        }
    }
</script>

</body>
</html>
