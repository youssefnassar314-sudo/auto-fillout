<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheetah Pro | Zero Crash 🐆</title>

<script src="pizzip.min.js"></script>
<script src="docxtemplater.js"></script>
<script src="FileSaver.min.js"></script>
<script src="docxtemplater-image-module-free.js"></script>

<style>

body{
font-family:sans-serif;
background:#f4f4f4;
padding:20px;
}

.card{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.status{
padding:10px;
margin-bottom:20px;
border-radius:6px;
text-align:center;
font-weight:bold;
background:#d4edda;
color:#155724;
}

textarea{
width:100%;
height:150px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
padding:10px;
}

input{
display:block;
margin-bottom:10px;
}

button{
width:100%;
padding:15px;
background:#28a745;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>Cheetah Pro: Magic Fill 🐆</h2>

<div id="status" class="status">
SYSTEM READY
</div>

<label>Template (.docx)</label>
<input type="file" id="tpl">

<label>Client Data</label>
<textarea id="raw" placeholder="PASTE CLIENT DATA"></textarea>

<label>Sketch Image</label>
<input type="file" id="sk" accept="image/png,image/jpeg">

<label>Signature Image</label>
<input type="file" id="si" accept="image/png,image/jpeg">

<button onclick="generateDocument()">Generate Document</button>

</div>

<script>

function extract(text,label){

const regex=new RegExp(label+"\\s*:\\s*(.*)","i");

const match=text.match(regex);

return match?match[1].trim():"";

}

function getBuffer(file){

return new Promise((resolve,reject)=>{

if(!file){
resolve(null);
return;
}

const reader=new FileReader();

reader.onload=e=>resolve(e.target.result);

reader.onerror=err=>reject(err);

reader.readAsArrayBuffer(file);

});

}

async function generateDocument(){

try{

const template=document.getElementById("tpl").files[0];

const rawText=document.getElementById("raw").value;

const sketchFile=document.getElementById("sk").files[0];

const signatureFile=document.getElementById("si").files[0];

if(!template){

alert("Upload template first");

return;

}

const templateBuffer=await getBuffer(template);

const sketchBuffer=await getBuffer(sketchFile);

const signatureBuffer=await getBuffer(signatureFile);

const zip=new PizZip(templateBuffer);

const imageOptions={

centered:false,

getImage:function(tagValue){

if(!tagValue) return null;

return tagValue;

},

getSize:function(img,tagValue,tagName){

if(tagName==="sketch") return [350,220];

if(tagName==="signature") return [160,80];

return [100,100];

}

};

const imageModule=new window.ImageModule(imageOptions);

const doc=new window.docxtemplater(zip,{

modules:[imageModule],

paragraphLoop:true,

linebreaks:true

});

doc.render({

date:new Date().toLocaleDateString(),

last_name:extract(rawText,"LAST NAME"),
first_name:extract(rawText,"FIRST NAME"),
middle_name:extract(rawText,"MIDDLE NAME"),

mobile:extract(rawText,"MOBILE PHONE"),
email:extract(rawText,"EMAIL ADDRESS"),
id_no:extract(rawText,"ID TYPE/NO."),

house_no:extract(rawText,"HOUSE/BLOCK/UNIT NO."),
street:extract(rawText,"STREET"),
barangay:extract(rawText,"BARANGAY"),
municipality:extract(rawText,"MUNICIPALITY"),

sketch:sketchBuffer,
signature:signatureBuffer

});

const out=doc.getZip().generate({

type:"blob",

mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"

});

const clientName=extract(rawText,"LAST NAME")||"Client";

saveAs(out,"SKYLINE_Application_"+clientName+".docx");

document.getElementById("status").innerText="SUCCESS!";

}catch(error){

console.error(error);

alert(error.message);

document.getElementById("status").innerText="ERROR";

}

}

</script>

</body>
</html>s
