<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheetah Pro | Workspace</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --primary: #0f172a;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: rgba(226, 232, 240, 0.8);
            --focus-ring: rgba(79, 70, 229, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Glassmorphism Card with Fade-In Animation */
        .workspace {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            width: 100%;
            max-width: 520px;
            padding: 45px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06), inset 0 1px 0 rgba(255, 255, 255, 0.6);
            border: 1px solid var(--border);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Gradient Text for Header */
        h2 {
            margin: 0;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: 400;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        /* Custom File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .file-upload-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .file-upload-box:hover {
            border-color: #4f46e5;
            background: #eef2ff;
            color: #4f46e5;
        }

        #tpl {
            display: none; /* Hide default ugly input */
        }

        /* Textarea Styling */
        textarea {
            width: 100%;
            padding: 16px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            box-sizing: border-box;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            height: 160px;
            resize: none;
            line-height: 1.5;
        }

        textarea:focus {
            outline: none;
            border-color: #4f46e5;
            background: #ffffff;
            box-shadow: 0 0 0 4px var(--focus-ring);
        }

        textarea::placeholder {
            color: #94a3b8;
        }

        /* Premium Button */
        button {
            width: 100%;
            padding: 18px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: translateY(1px);
        }

        #status {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 20px;
            min-height: 22px;
            transition: color 0.3s ease;
        }
    </style>
</head>
<body>

<div class="workspace">
    <div class="header">
        <h2>Cheetah Pro</h2>
        <div class="subtitle">Client Document Generator</div>
    </div>

    <label>1. Application Form</label>
    <div class="file-upload-wrapper">
        <input type="file" id="tpl" accept=".docx">
        <label for="tpl" class="file-upload-box" id="upload-label">
            📄 Upload SKYLINE.docx Template
        </label>
    </div>

    <label>2. Client Information Block</label>
    <textarea id="raw" placeholder="LAST NAME: Dela Cruz&#10;FIRST NAME: Juan&#10;MUNICIPALITY: Binangonan&#10;..."></textarea>

    <button onclick="handleGenerate()">Generate Application</button>
    <div id="status"></div>
</div>

<script>
    // Update File Upload Label when a file is selected
    document.getElementById('tpl').addEventListener('change', function(e) {
        const fileName = e.target.files[0] ? e.target.files[0].name : "📄 Upload SKYLINE.docx Template";
        document.getElementById('upload-label').innerText = fileName;
        
        if (e.target.files[0]) {
            document.getElementById('upload-label').style.borderColor = "#4f46e5";
            document.getElementById('upload-label').style.color = "#4f46e5";
            document.getElementById('upload-label').style.background = "#eef2ff";
        }
    });

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    function getFormattedDate() {
        const today = new Date();
        return today.toLocaleDateString('en-US', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
    }

    function handleGenerate() {
        const status = document.getElementById('status');
        const tFile = document.getElementById('tpl').files[0];
        const rawText = document.getElementById('raw').value;

        if (!tFile || !rawText) {
            status.innerHTML = "⚠️ Please upload template and paste data.";
            status.style.color = "#ef4444";
            return;
        }

        status.innerHTML = "Processing document...";
        status.style.color = "#4f46e5";

        setTimeout(() => processDocument(tFile, rawText, status), 50);
    }

    async function processDocument(tFile, rawText, status) {
        try {
            const tBuf = await getBuf(tFile);
            const zip = new PizZip(tBuf);

            const doc = new window.docxtemplater(zip, {
                paragraphLoop: true,
                linebreaks: true
            });

            // Map the data - Naka-ALL CAPS lahat maliban sa email
            doc.render({
                date: getFormattedDate().toUpperCase(), 
                last_name: extract(rawText, "LAST NAME").toUpperCase(),
                first_name: extract(rawText, "FIRST NAME").toUpperCase(),
                middle_name: extract(rawText, "MIDDLE NAME").toUpperCase(),
                hp: extract(rawText, "HOUSE PHONE").toUpperCase(),
                op: extract(rawText, "OFFICE PHONE").toUpperCase(),
                mobile: extract(rawText, "MOBILE PHONE").toUpperCase(),
                email: extract(rawText, "EMAIL ADDRESS"), 
                id_no: extract(rawText, "ID TYPE/NO.").toUpperCase(),
                birthdate: extract(rawText, "BIRTHDATE").toUpperCase(),
                age: extract(rawText, "AGE").toUpperCase(),
                sex: extract(rawText, "SEX").toUpperCase(),
                civil_status: extract(rawText, "CIVIL STATUS").toUpperCase(),
                spouse_name: extract(rawText, "SPOUSE NAME").toUpperCase(),
                house_no: extract(rawText, "HOUSE/BLOCK/UNIT NO.").toUpperCase(),
                street: extract(rawText, "STREET").toUpperCase(),
                building: extract(rawText, "BUILDING").toUpperCase(),
                subd: extract(rawText, "DISTRICT/SUBDIVISION").toUpperCase(),
                barangay: extract(rawText, "BARANGAY").toUpperCase(),
                municipality: extract(rawText, "MUNICIPALITY").toUpperCase(),
                occupation: extract(rawText, "OCCUPATION/POSITION").toUpperCase(),
                employer: extract(rawText, "EMPLOYER").toUpperCase(),
                occ_address: extract(rawText, "ADDRESS").toUpperCase(),
                spouse_occ: extract(rawText, "SPOUSE OCCUPATION").toUpperCase(),
                spouse_emp: extract(rawText, "SPOUSE EMPLOYER").toUpperCase(),
                spouse_add_occ: extract(rawText, "SPOUSE EMPLOYER ADDRESS").toUpperCase(),
                plan_name: extract(rawText, "PLAN NEEDED").toUpperCase(),
                plan_value: extract(rawText, "PLAN NEEDED").replace(/\D/g, ""),
            });

            const out = doc.getZip().generate({ 
                type: "blob",
                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
            });

            const lName = extract(rawText, "LAST NAME") || "Unknown";
            const fName = extract(rawText, "FIRST NAME") || "Client";
            const muni = extract(rawText, "MUNICIPALITY") || "No_City";
            
            const fileName = `${lName}, ${fName} - ${muni}.docx`;

            saveAs(out, fileName);

            status.innerHTML = "✨ Application successfully generated!";
            status.style.color = "#10b981";

            document.getElementById('raw').value = "";
            
        } catch (err) {
            console.error(err);
            status.innerHTML = "❌ An error occurred. Check the console.";
            status.style.color = "#ef4444";
        }
    }
</script>

</body>
</html>
