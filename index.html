<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheetah Pro | Magic Form Filler 🐆</title>
    
    <script src="pizzip.min.js"></script>
    <script src="docxtemplater.js"></script>
    <script src="FileSaver.min.js"></script>
    <script src="docxtemplater-image-module-free.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 650px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        .status-bar { padding: 12px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; }
        .loading { background: #fff3cd; color: #856404; }
        .ready { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        textarea { width: 100%; height: 180px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; font-family: monospace; font-size: 13px; box-sizing: border-box; }
        .input-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 13px; }
        input[type="file"] { width: 100%; padding: 8px; background: #f1f3f4; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #218838; transform: translateY(-1px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cheetah Pro: Magic Fill 🐆</h2>
    <div id="status" class="status-bar loading">Initializing System...</div>

    <div class="input-group">
        <label>1. Upload SKYLINE.docx Template</label>
        <input type="file" id="tplFile" accept=".docx">
    </div>

    <div class="input-group">
        <label>2. Paste Client Data Block</label>
        <textarea id="rawInput" placeholder="LAST NAME: GREGORIO..."></textarea>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>3. Sketch (JPEG)</label>
            <input type="file" id="sketchFile" accept="image/jpeg">
        </div>
        <div class="input-group">
            <label>4. Signature (PNG)</label>
            <input type="file" id="sigFile" accept="image/png">
        </div>
    </div>

    <button id="genBtn" class="btn" onclick="generateDocument()" disabled>Download Completed Word</button>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const genBtn = document.getElementById('genBtn');

    // 1. Library Health Check
    window.onload = function() {
        const isReady = window.PizZip && window.docxtemplater && (window.ImageModule || window.DocxtemplaterImageModule);
        if (isReady) {
            statusDiv.innerHTML = "✅ SYSTEM READY | March 16, 2026";
            statusDiv.className = "status-bar ready";
            genBtn.disabled = false;
        } else {
            statusDiv.innerHTML = "❌ ERROR: One or more scripts are missing or corrupted.";
            statusDiv.className = "status-bar error";
        }
    };

    // 2. Helper to read files as ArrayBuffer
    const getFileBuffer = (file) => new Promise((resolve) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsArrayBuffer(file);
    });

    // 3. Extraction Logic (The "Magic Paste")
    function extractData(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    // 4. The Main Generation Function
async function generateDocument() {
    const template = document.getElementById('tplFile').files[0];
    const rawText = document.getElementById('rawInput').value;
    const sketch = document.getElementById('sketchFile').files[0];
    const signature = document.getElementById('sigFile').files[0];

    if (!template || !rawText) return alert("Kulang ang template o data!");

    try {
        document.getElementById('status').innerText = "⚙️ Processing... March 16, 2026";
        
        const [tBuf, skBuf, siBuf] = await Promise.all([
            getFileBuffer(template),
            getFileBuffer(sketch),
            getFileBuffer(signature)
        ]);

        const zip = new PizZip(tBuf);
        const ImgConstructor = window.ImageModule || window.DocxtemplaterImageModule;

        const imgOptions = {
            centered: false,
            getImage: (tagValue) => tagValue,
            getSize: (img, tagValue, tagName) => {
                if (!tagValue) return [0, 0]; // Safety check para sa missing images
                if (tagName === "sketch") return [350, 220];
                if (tagName === "signature") return [160, 80];
                return [100, 100];
            }
        };

        const doc = new docxtemplater(zip, {
            modules: [new ImgConstructor(imgOptions)],
            paragraphLoop: true,
            linebreaks: true
        });

        doc.render({
            date: "March 16, 2026",
            last_name: extractData(rawText, "LAST NAME"),
            first_name: extractData(rawText, "FIRST NAME"),
            middle_name: extractData(rawText, "MIDDLE NAME"),
            mobile: extractData(rawText, "MOBILE PHONE"),
            email: extractData(rawText, "EMAIL ADDRESS"),
            id_no: extractData(rawText, "ID TYPE/NO."),
            birthdate: extractData(rawText, "BIRTHDATE"), // New
            age: extractData(rawText, "AGE"), // New
            sex: extractData(rawText, "SEX"), // New
            civil_status: extractData(rawText, "CIVIL STATUS"), // New
            spouse_name: extractData(rawText, "SPOUSE NAME"), // New
            house_no: extractData(rawText, "HOUSE/BLOCK/UNIT NO."),
            street: extractData(rawText, "STREET"),
            barangay: extractData(rawText, "BARANGAY"),
            municipality: extractData(rawText, "MUNICIPALITY"),
            sketch: skBuf,
            signature: siBuf
        });

        const out = doc.getZip().generate({ type: "blob" });
        saveAs(out, `Application_${extractData(rawText, "LAST NAME")}.docx`);
        document.getElementById('status').innerText = "✅ Success!";
        
    } catch (error) {
        console.error(error);
        // Ipakita ang eksaktong tag na may error
        let errorMsg = error.message;
        if (error.properties && error.properties.errors) {
            errorMsg = error.properties.errors.map(e => e.properties.explanation).join("\n");
        }
        alert("SABLAY: " + errorMsg);
        document.getElementById('status').innerText = "❌ FAILED: Check Console.";
    }
}
</script>

</body>
</html>
