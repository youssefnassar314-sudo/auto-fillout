<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheetah Pro | Template Edition 🐆</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.45.0/docxtemplater.js"></script>
    <script src="https://unpkg.com/pizzip@3.1.6/dist/pizzip.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/imagemodule.js"></script>

    <style>
        :root { --neon: #00ff9d; --dark: #0f0f12; }
        body { font-family: sans-serif; background: var(--dark); color: white; display: flex; justify-content: center; padding: 40px; }
        .card { width: 100%; max-width: 600px; background: #1a1a1f; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 5px; font-family: monospace; font-size: 0.8rem; background: rgba(0,255,157,0.1); color: var(--neon); border: 1px solid var(--neon); }
        textarea { width: 100%; height: 150px; background: #000; border: 1px solid #444; color: var(--neon); padding: 10px; border-radius: 5px; font-family: monospace; box-sizing: border-box; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.8rem; color: #888; text-transform: uppercase; }
        input { display: block; margin: 10px 0; color: #888; }
        button { width: 100%; padding: 15px; background: var(--neon); color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; text-transform: uppercase; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,157,0.4); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--neon); margin-top: 0;">Cheetah Pro: Template 🐆</h2>
    <div id="status" class="status">READY_SYSTEM_V2.0_2026</div>

    <label>1. Upload Template (SKYLINE - Copy.docx)</label>
    <input type="file" id="tpl">

    <label>2. Paste Client Data Block</label>
    <textarea id="raw" placeholder="LAST NAME: Cruz&#10;FIRST NAME: Juan..."></textarea>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>3. Sketch</label>
            <input type="file" id="sk" accept="image/*">
        </div>
        <div>
            <label>4. Signature</label>
            <input type="file" id="si" accept="image/*">
        </div>
    </div>

    <button onclick="generateFromTemplate()">Generate Skyline Form</button>
</div>

<script>
    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generateFromTemplate() {
        const templateFile = document.getElementById('tpl').files[0];
        const rawText = document.getElementById('raw').value;
        const skFile = document.getElementById('sk').files[0];
        const siFile = document.getElementById('si').files[0];

        if (!templateFile || !rawText) return alert("Kulang ang inputs!");

        try {
            document.getElementById('status').innerText = "PROCESSING_BUFFERS...";
            
            const tBuf = await getBuf(templateFile);
            const skBuf = await getBuf(skFile);
            const siBuf = await getBuf(siFile);

            const zip = new PizZip(tBuf);
            
            // Setup Image Module
            const imgOptions = {
                centered: false,
                getImage: (tagValue) => tagValue,
                getSize: (img, tagValue, tagName) => {
                    if (tagName === "sketch") return [350, 220];
                    if (tagName === "signature") return [160, 80];
                    return [10, 10];
                }
            };

            const doc = new window.docxtemplater(zip, {
                modules: [new window.ImageModule(imgOptions)],
                paragraphLoop: true,
                linebreaks: true
            });

            // I-fill ang tags base sa format ng template mo 
            doc.render({
                date: "March 16, 2026",
                last_name: extract(rawText, "LAST NAME"),
                first_name: extract(rawText, "FIRST NAME"),
                middle_name: extract(rawText, "MIDDLE NAME"),
                mobile: extract(rawText, "MOBILE PHONE"),
                email: extract(rawText, "EMAIL ADDRESS"),
                id_no: extract(rawText, "ID TYPE/NO."),
                house_no: extract(rawText, "HOUSE/BLOCK/UNIT NO."),
                street: extract(rawText, "STREET"),
                barangay: extract(rawText, "BARANGAY"),
                municipality: extract(rawText, "MUNICIPALITY"),
                sketch: skBuf,
                signature: siBuf
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `SKYLINE_Application_${extract(rawText, "LAST NAME")}.docx`);
            document.getElementById('status').innerText = "SUCCESS_DOWNLOADED";

        } catch (error) {
            console.error(error);
            alert("Sablay: " + error.message);
        }
    }
</script>
</body>
</html>
