<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheetah Pro | Online Form Filler</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pizzip/3.1.4/pizzip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docxtemplater/3.37.2/docxtemplater.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater-image-module-free@1.1.1/build/docxtemplater-image-module-free.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 13px; }
        .ready { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; font-family: monospace; }
        .btn { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#1a73e8;">Cheetah Agent Pro: Magic Fill 🐆</h2>
    <div id="status" class="status">Checking Libraries...</div>

    <label><b>1. Template (SKYLINE.docx)</b></label>
    <input type="file" id="tpl" style="display:block; margin: 10px 0 20px 0;">

    <label><b>2. Paste Client Text Block</b></label>
    <textarea id="raw" placeholder="LAST NAME: "></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <div style="flex:1;">
            <label><b>Sketch (JPG)</b></label>
            <input type="file" id="sk" accept="image/jpeg" style="width:100%;">
        </div>
        <div style="flex:1;">
            <label><b>Signature (PNG)</b></label>
            <input type="file" id="si" accept="image/png" style="width:100%;">
        </div>
    </div>

    <button id="btn" class="btn" onclick="generate()" disabled>Generate & Download</button>
</div>

<script>
    // Diagnostic check for GitHub Pages
    const check = setInterval(() => {
        const isReady = window.PizZip && window.docxtemplater && (window.ImageModule || window.DocxtemplaterImageModule);
        if (isReady) {
            document.getElementById('status').innerText = "✅ System Ready | March 16, 2026";
            document.getElementById('status').className = "status ready";
            document.getElementById('btn').disabled = false;
            clearInterval(check);
        } else {
            document.getElementById('status').innerText = "❌ Loading Libraries... (Check Console)";
            document.getElementById('status').className = "status error";
        }
    }, 1000);

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generate() {
        const tFile = document.getElementById('tpl').files[0];
        const rawT = document.getElementById('raw').value;
        const skFile = document.getElementById('sk').files[0];
        const siFile = document.getElementById('si').files[0];

        if (!tFile || !rawT) return alert("Kulang ng template o data!");

        try {
            const [tBuf, skBuf, siBuf] = await Promise.all([getBuf(tFile), getBuf(skFile), getBuf(siBuf)]);
            const zip = new PizZip(tBuf);

            // FIX PARA SA IMAGE MODULE CONSTRUCTOR SA GITHUB/CDN
            const ImgModule = window.ImageModule || window.DocxtemplaterImageModule;
            
            const doc = new docxtemplater(zip, {
                modules: [new ImgModule({
                    centered: false,
                    getImage: (v) => v,
                    getSize: (img, v, name) => {
                        if (name === "sketch") return [350, 220];
                        if (name === "signature") return [150, 75];
                        return [100, 100];
                    }
                })],
                paragraphLoop: true,
                linebreaks: true
            });

            doc.render({
                date: "March 16, 2026",
                last_name: extract(rawT, "LAST NAME"),
                first_name: extract(rawT, "FIRST NAME"),
                middle_name: extract(rawT, "MIDDLE NAME"),
                mobile: extract(rawT, "MOBILE PHONE"),
                email: extract(rawT, "EMAIL ADDRESS"),
                id_no: extract(rawT, "ID TYPE/NO."),
                house_no: extract(rawT, "HOUSE/BLOCK/UNIT NO."),
                street: extract(rawT, "STREET"),
                barangay: extract(rawT, "BARANGAY"),
                municipality: extract(rawT, "MUNICIPALITY"),
                sketch: skBuf,
                signature: siBuf
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `Application_${extract(rawT, "LAST NAME")}.docx`);
            alert("Success!");
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        }
    }
</script>
</body>
</html>
