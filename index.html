<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheetah Pro | Modern Engine 🐆</title>
    <script src="https://unpkg.com/docx-templates/lib/bundle.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --accent: #00d4ff; --bg: #050505; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; padding: 40px; }
        .card { max-width: 600px; margin: auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; box-shadow: 0 15px 35px rgba(0,212,255,0.1); }
        .status { font-family: monospace; color: var(--accent); margin-bottom: 20px; font-size: 0.8rem; letter-spacing: 1px; }
        textarea { width: 100%; height: 120px; background: #000; border: 1px solid #333; color: #00ff9d; padding: 12px; border-radius: 10px; resize: none; }
        input[type="file"] { margin: 15px 0; font-size: 0.8rem; color: #666; }
        button { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }
        label { display: block; margin-top: 15px; font-size: 0.7rem; font-weight: bold; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <div class="status">ENGINE: DOCX-TEMPLATES_V4 // MARCH 16, 2026</div>
    <h2 style="margin-top:0">Cheetah Pro 🐆</h2>

    <label>1. SKYLINE Template (.docx)</label>
    <input type="file" id="tpl">

    <label>2. Data Block</label>
    <textarea id="raw" placeholder="PASTE DATA HERE..."></textarea>

    <div style="display: flex; gap: 15px;">
        <div style="flex: 1;">
            <label>Sketch</label>
            <input type="file" id="sk">
        </div>
        <div style="flex: 1;">
            <label>Signature</label>
            <input type="file" id="si">
        </div>
    </div>

    <button onclick="buildReport()">Execute Generation</button>
</div>

<script>
    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "N/A";
    }

    async function buildReport() {
        const tFile = document.getElementById('tpl').files[0];
        const raw = document.getElementById('raw').value;
        const skBuf = await getBuf(document.getElementById('sk').files[0]);
        const siBuf = await getBuf(document.getElementById('si').files[0]);

        if (!tFile || !raw) return alert("Upload template and paste data!");

        try {
            const template = await getBuf(tFile);

            // Gagamit tayo ng createReport mula sa library
            const report = await window.docxTemplates.createReport({
                template,
                data: {
                    last_name: extract(raw, "LAST NAME"),
                    first_name: extract(raw, "FIRST NAME"),
                    mobile: extract(raw, "MOBILE PHONE"),
                    email: extract(raw, "EMAIL ADDRESS"),
                    date: "March 16, 2026",
                    // Image Handling: Dito mo na iseset ang size!
                    sketch: skBuf ? { width: 12, height: 7, data: skBuf, extension: '.png' } : null,
                    signature: siBuf ? { width: 4, height: 2, data: siBuf, extension: '.png' } : null
                },
                // Ito ang delimiters para sa module na ito
                cmdDelimiter: ['{', '}']
            });

            saveAs(new Blob([report]), `SKYLINE_REPORT_${extract(raw, "LAST NAME")}.docx`);
        } catch (err) {
            console.error(err);
            alert("Error: " + err.message);
        }
    }
</script>
</body>
</html>
