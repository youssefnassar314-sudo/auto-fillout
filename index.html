<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheetah Pro | Final Online Version 🐆</title>
    
    <script src="pizzip.min.js"></script>
    <script src="docxtemplater.js"></script>
    <script src="FileSaver.min.js"></script>
    <script src="docxtemplater-image-module-free.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 0; }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 13px; }
        .ok { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        textarea { width: 100%; height: 150px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; font-family: monospace; }
        .btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cheetah Pro: Online 🐆</h2>
    <div id="status" class="status">Checking System...</div>

    <label><b>1. Template (SKYLINE.docx)</b></label>
    <input type="file" id="tpl" style="display:block; margin: 10px 0 20px 0;">

    <label><b>2. Paste Client Data</b></label>
    <textarea id="raw" placeholder="LAST NAME: GREGORIO..."></textarea>

    <div style="display:flex; gap:10px; margin-top:15px;">
        <div style="flex:1;"><label><b>Sketch (JPG)</b></label><input type="file" id="sk" accept="image/jpeg"></div>
        <div style="flex:1;"><label><b>Signature (PNG)</b></label><input type="file" id="si" accept="image/png"></div>
    </div>

    <button id="genBtn" class="btn" onclick="generate()" disabled>Generate Application Form</button>
</div>

<script>
    // Diagnostic check for GitHub local files
    window.onload = function() {
        const s = document.getElementById('status');
        const b = document.getElementById('genBtn');
        // Check kung loaded ang Image Module (it can be ImageModule or DocxtemplaterImageModule)
        const imgReady = window.ImageModule || window.DocxtemplaterImageModule;
        
        if (window.PizZip && window.docxtemplater && imgReady) {
            s.innerText = "✅ SYSTEM READY: March 16, 2026";
            s.className = "status ok";
            b.disabled = false;
        } else {
            s.innerText = "❌ ERROR: One or more scripts are missing in your folder.";
            s.className = "status error";
        }
    };

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generate() {
        try {
            const tFile = document.getElementById('tpl').files[0];
            const rawT = document.getElementById('raw').value;
            const skFile = document.getElementById('sk').files[0];
            const siFile = document.getElementById('si').files[0];

            const [tBuf, skBuf, siBuf] = await Promise.all([getBuf(tFile), getBuf(skFile), getBuf(siBuf)]);
            const zip = new PizZip(tBuf);

            const ImgConstructor = window.ImageModule || window.DocxtemplaterImageModule;
            
            const doc = new docxtemplater(zip, {
                modules: [new ImgConstructor({
                    centered: false,
                    getImage: (v) => v,
                    getSize: (img, v, name) => {
                        if (name === "sketch") return [350, 220];
                        if (name === "signature") return [150, 75];
                        return [100, 100];
                    }
                })],
                paragraphLoop: true,
                linebreaks: true
            });

            doc.render({
                date: "March 16, 2026", // Automatic current date
                last_name: extract(rawT, "LAST NAME"),
                first_name: extract(rawT, "FIRST NAME"),
                middle_name: extract(rawT, "MIDDLE NAME"),
                mobile: extract(rawT, "MOBILE PHONE"),
                email: extract(rawT, "EMAIL ADDRESS"),
                id_no: extract(rawT, "ID TYPE/NO."),
                house_no: extract(rawT, "HOUSE/BLOCK/UNIT NO."),
                street: extract(rawT, "STREET"),
                barangay: extract(rawT, "BARANGAY"),
                municipality: extract(rawT, "MUNICIPALITY"),
                sketch: skBuf,
                signature: siBuf
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `Application_${extract(rawT, "LAST NAME")}.docx`);
        } catch (e) {
            alert("Error: " + e.message);
        }
    }
</script>
</body>
</html>
