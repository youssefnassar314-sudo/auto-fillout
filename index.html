<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheetah Pro | Ultimate Form Filler</title>
    
    <script src="https://unpkg.com/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.2/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/docxtemplater-image-module-free@1.1.1/build/docxtemplater-image-module-free.js"></script>
    
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-top: 0; }
        .status-bar { padding: 12px; margin-bottom: 20px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; }
        .loading { background: #fff3cd; color: #856404; }
        .ready { background: #d4edda; color: #155724; }
        textarea { width: 100%; height: 200px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; font-family: monospace; font-size: 13px; box-sizing: border-box; }
        .input-group { margin: 20px 0; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        input[type="file"] { width: 100%; padding: 10px; background: #f1f3f4; border-radius: 6px; border: 1px solid #ddd; }
        .btn { width: 100%; padding: 18px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.2s; }
        .btn:hover { background: #218838; transform: translateY(-2px); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cheetah Pro: Magic Fill 🐆</h2>
    <div id="status" class="status-bar loading">Checking System Libraries...</div>

    <div class="input-group">
        <label>1. Upload SKYLINE.docx Template</label>
        <input type="file" id="tplFile" accept=".docx">
    </div>

    <div class="input-group">
        <label>2. Paste Client Text Block</label>
        <textarea id="rawInput" placeholder="LAST NAME: GREGORIO&#10;FIRST NAME: LIEZEL..."></textarea>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="input-group">
            <label>3. Sketch (JPEG)</label>
            <input type="file" id="sketchFile" accept="image/jpeg">
        </div>
        <div class="input-group">
            <label>4. Signature (PNG)</label>
            <input type="file" id="sigFile" accept="image/png">
        </div>
    </div>

    <button id="genBtn" class="btn" onclick="generateDocument()" disabled>Download Completed Form</button>
</div>

<script>
    const statusDiv = document.getElementById('status');
    const genBtn = document.getElementById('genBtn');

    // Library Readiness Check
    const checkLibs = setInterval(() => {
        if (window.PizZip && window.docxtemplater && window.ImageModule) {
            statusDiv.innerHTML = "✅ SYSTEM READY: March 16, 2026";
            statusDiv.className = "status-bar ready";
            genBtn.disabled = false;
            clearInterval(checkInterval);
        }
    }, 500);

    // Helper for processing images/files
    const getFileBuffer = (file) => new Promise((resolve) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = (e) => resolve(e.target.result);
        reader.readAsArrayBuffer(file);
    });

    // Regex parsing logic for the "Magic Paste"
    function extractData(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generateDocument() {
        const template = document.getElementById('tplFile').files[0];
        const rawText = document.getElementById('rawInput').value;
        const sketch = document.getElementById('sketchFile').files[0];
        const signature = document.getElementById('sigFile').files[0];

        if (!template || !rawText) return alert("Paki-upload ang template at i-paste ang data!");

        try {
            statusDiv.innerHTML = "⚙️ Processing... Generating your file.";
            
            const [tBuf, skBuf, siBuf] = await Promise.all([
                getFileBuffer(template),
                getFileBuffer(sketch),
                getFileBuffer(signature)
            ]);

            const zip = new PizZip(tBuf);
            
            // Image Module Setup
            const imgOptions = {
                centered: false,
                getImage: (tagValue) => tagValue,
                getSize: (img, tagValue, tagName) => {
                    if (tagName === "sketch") return [350, 220]; // Sketch box size
                    if (tagName === "signature") return [160, 80]; // Signature size
                    return [100, 100];
                }
            };

            const doc = new docxtemplater(zip, {
                modules: [new window.ImageModule(imgOptions)],
                paragraphLoop: true,
                linebreaks: true
            });

            // The actual data mapping
            doc.render({
                date: "March 16, 2026", // Automatic current date
                last_name: extractData(rawText, "LAST NAME"),
                first_name: extractData(rawText, "FIRST NAME"),
                middle_name: extractData(rawText, "MIDDLE NAME"),
                mobile: extractData(rawText, "MOBILE PHONE"),
                email: extractData(rawText, "EMAIL ADDRESS"),
                id_no: extractData(rawText, "ID TYPE/NO."),
                house_no: extractData(rawText, "HOUSE/BLOCK/UNIT NO."),
                street: extractData(rawText, "STREET"),
                barangay: extractData(rawText, "BARANGAY"),
                municipality: extractData(rawText, "MUNICIPALITY"),
                sketch: skBuf,
                signature: siBuf
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `Application_${extractData(rawText, "LAST NAME")}.docx`);
            statusDiv.innerHTML = "✅ SUCCESS: File Downloaded!";
            
        } catch (error) {
            console.error(error);
            alert("Error: " + error.message);
            statusDiv.innerHTML = "❌ FAILED: Check your Word tags.";
        }
    }
</script>

</body>
</html>
