<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheetah Pro | Zero-Crash Edition 🐆</title>
    <script src="pizzip.min.js"></script>
    <script src="docxtemplater.js"></script>
    <script src="FileSaver.min.js"></script>
    <script src="docxtemplater-image-module-free.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .ready { background: #d4edda; color: #155724; }
        textarea { width: 100%; height: 150px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        input { display: block; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cheetah Pro: Magic Fill 🐆</h2>
    <div id="status" class="status ready">SYSTEM READY | March 16, 2026</div>

    <label>1. Template (SKYLINE.docx)</label>
    <input type="file" id="tpl">

    <label>2. Data Block</label>
    <textarea id="raw" placeholder="PASTE DATA HERE..."></textarea>

    <label>3. Images (Optional)</label>
    <input type="file" id="sk" accept="image/jpeg">
    <input type="file" id="si" accept="image/png">

    <button onclick="generate()">Generate & Download</button>
</div>

<script>
    // 1x1 Transparent Pixel para iwas "reading '0'" error kung walang in-upload na image
    const transparentPixel = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generate() {
        try {
            const tFile = document.getElementById('tpl').files[0];
            const rawT = document.getElementById('raw').value;
            const skFile = document.getElementById('sk').files[0];
            const siFile = document.getElementById('si').files[0];

            if (!tFile) return alert("Paki-upload ang template!");

            const [tBuf, skBuf, siBuf] = await Promise.all([getBuf(tFile), getBuf(skFile), getBuf(siBuf)]);
            const zip = new PizZip(tBuf);

            const ImgConstructor = window.ImageModule || window.DocxtemplaterImageModule;
            
            const doc = new docxtemplater(zip, {
                modules: [new ImgConstructor({
                    centered: false,
                    getImage: function(tagValue) {
                        // FALLBACK: Kung walang buffer, ibigay ang transparent pixel
                        return tagValue ? tagValue : transparentPixel;
                    },
                    getSize: function(img, tagValue, tagName) {
                        if (tagName === "sketch") return [350, 220];
                        if (tagName === "signature") return [150, 75];
                        return [10, 10];
                    }
                })],
                paragraphLoop: true,
                linebreaks: true
            });

            doc.render({
                date: "March 16, 2026",
                last_name: extract(rawT, "LAST NAME"),
                first_name: extract(rawT, "FIRST NAME"),
                middle_name: extract(rawT, "MIDDLE NAME"),
                mobile: extract(rawT, "MOBILE PHONE"),
                email: extract(rawT, "EMAIL ADDRESS"),
                id_no: extract(rawT, "ID TYPE/NO."),
                house_no: extract(rawT, "HOUSE/BLOCK/UNIT NO."),
                street: extract(rawT, "STREET"),
                barangay: extract(rawT, "BARANGAY"),
                municipality: extract(rawT, "MUNICIPALITY"),
                sketch: skBuf, // Pwedeng null, handled na ng getImage
                signature: siBuf
            });

            const out = doc.getZip().generate({ type: "blob" });
            saveAs(out, `Cheetah_App_${extract(rawT, "LAST NAME") || 'Client'}.docx`);
            
        } catch (e) {
            console.error(e);
            alert("ERROR: " + e.message);
        }
    }
</script>
</body>
</html>
