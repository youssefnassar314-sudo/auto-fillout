<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHEETAH PRO 2026 | OS</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/docx/8.5.0/docx.umd.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --neon-green: #00ff9d;
            --neon-blue: #00d4ff;
            --bg-dark: #0a0a0c;
            --card-bg: #141417;
            --border-color: #2a2a30;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--neon-green), var(--neon-blue));
            border-radius: 16px 16px 0 0;
        }

        h2 {
            margin-top: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--neon-green);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-bar {
            background: rgba(0, 255, 157, 0.05);
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            margin-bottom: 25px;
            color: var(--neon-green);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #888;
        }

        textarea {
            width: 100%;
            height: 160px;
            background: #000;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }

        textarea:focus {
            border-color: var(--neon-green);
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .upload-box {
            background: #1c1c21;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
        }

        input[type="file"] {
            width: 100%;
            font-size: 0.75rem;
            color: #888;
        }

        button {
            width: 100%;
            padding: 18px;
            background: var(--neon-green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 157, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 255, 157, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cheetah Pro <span>🐆</span></h2>
    <div id="status" class="status-bar">TERMINAL_READY > MARCH 16, 2026</div>

    <label>Client Data Block</label>
    <textarea id="raw" placeholder="PASTE DATA HERE... (e.g. LAST NAME: Cruz)"></textarea>

    <div class="upload-grid">
        <div class="upload-box">
            <label>Location Sketch</label>
            <input type="file" id="sk" accept="image/*">
        </div>
        <div class="upload-box">
            <label>Client Signature</label>
            <input type="file" id="si" accept="image/*">
        </div>
    </div>

    <button onclick="runEngine()">Generate Document</button>
    
    <div class="footer">Powered by Gemini & Docx.js UMD</div>
</div>

<script>
    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "---";
    }

    async function runEngine() {
        const rawText = document.getElementById('raw').value;
        const skFile = document.getElementById('sk').files[0];
        const siFile = document.getElementById('si').files[0];
        const status = document.getElementById('status');

        if (!rawText) {
            status.style.color = "#ff4d4d";
            status.innerText = "ERROR: DATA_BLOCK_EMPTY";
            return alert("Paki-paste muna yung data!");
        }

        try {
            status.style.color = "var(--neon-blue)";
            status.innerText = "INITIALIZING_DOCX_ENGINE...";

            const skBuf = await getBuf(skFile);
            const siBuf = await getBuf(siFile);

            // Access via window.docx (UMD Way)
            const { Document, Packer, Paragraph, TextRun, ImageRun, AlignmentType, Table, TableRow, TableCell, WidthType, HeadingLevel } = window.docx;

            const doc = new Document({
                sections: [{
                    children: [
                        new Paragraph({
                            text: "SKYLINE APPLICATION FORM",
                            heading: HeadingLevel.HEADING_1,
                            alignment: AlignmentType.CENTER,
                        }),
                        new Paragraph({
                            text: "March 16, 2026 | System Generated",
                            alignment: AlignmentType.CENTER,
                        }),
                        new Paragraph({ text: "", spacing: { after: 200 } }),

                        // CLIENT INFORMATION TABLE
                        new Table({
                            width: { size: 100, type: WidthType.PERCENTAGE },
                            rows: [
                                new TableRow({
                                    children: [
                                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "CLIENT NAME", bold: true })] })] }),
                                        new TableCell({ children: [new Paragraph(`${extract(rawText, "LAST NAME")}, ${extract(rawText, "FIRST NAME")}`)] }),
                                    ],
                                }),
                                new TableRow({
                                    children: [
                                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "CONTACT", bold: true })] })] }),
                                        new TableCell({ children: [new Paragraph(extract(rawText, "MOBILE PHONE"))] }),
                                    ],
                                }),
                                new TableRow({
                                    children: [
                                        new TableCell({ children: [new Paragraph({ children: [new TextRun({ text: "ADDRESS", bold: true })] })] }),
                                        new TableCell({ children: [new Paragraph(`${extract(rawText, "HOUSE/BLOCK/UNIT NO.")} ${extract(rawText, "STREET")}, ${extract(rawText, "BARANGAY")}`)] }),
                                    ],
                                }),
                            ],
                        }),

                        new Paragraph({ text: "LOCATION SKETCH", bold: true, spacing: { before: 400, after: 100 } }),
                        ...(skBuf ? [
                            new Paragraph({
                                children: [
                                    new ImageRun({
                                        data: skBuf,
                                        transformation: { width: 500, height: 300 },
                                    }),
                                ],
                            })
                        ] : [new Paragraph("[No Sketch Provided]")] ),

                        new Paragraph({ text: "AUTHORIZED SIGNATURE", bold: true, spacing: { before: 400, after: 100 } }),
                        ...(siBuf ? [
                            new Paragraph({
                                children: [
                                    new ImageRun({
                                        data: siBuf,
                                        transformation: { width: 150, height: 80 },
                                    }),
                                ],
                            })
                        ] : [new Paragraph("[No Signature Provided]")] ),
                    ],
                }],
            });

            const blob = await Packer.toBlob(doc);
            const clientName = extract(rawText, "LAST NAME") || "UNKNOWN";
            saveAs(blob, `SKYLINE_PRO_${clientName}.docx`);

            status.style.color = "var(--neon-green)";
            status.innerText = "SUCCESS: DOCUMENT_GENERATED";

        } catch (err) {
            console.error(err);
            status.style.color = "#ff4d4d";
            status.innerText = "CRITICAL_ERROR: " + err.message;
        }
    }
</script>

</body>
</html>
