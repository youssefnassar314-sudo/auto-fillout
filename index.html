<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cheetah Pro | Zero-Crash Edition 🐆</title>
    <script src="pizzip.min.js"></script>
    <script src="docxtemplater.js"></script>
    <script src="FileSaver.min.js"></script>
    <script src="docxtemplater-image-module-free.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .status { padding: 10px; margin-bottom: 20px; border-radius: 6px; text-align: center; font-weight: bold; }
        .ready { background: #d4edda; color: #155724; }
        textarea { width: 100%; height: 150px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; padding: 10px; }
        input { display: block; margin-bottom: 10px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cheetah Pro: Magic Fill 🐆</h2>
    <div id="status" class="status ready">SYSTEM READY | March 16, 2026</div>

    <label>1. Template (SKYLINE.docx)</label>
    <input type="file" id="tpl">

    <label>2. Data Block</label>
    <textarea id="raw" placeholder="PASTE DATA HERE..."></textarea>

    <label>3. Images (Optional)</label>
    <input type="file" id="sk" accept="image/jpeg">
    <input type="file" id="si" accept="image/png">

    <button onclick="generate()">Generate & Download</button>
</div>

<script>
    // 1x1 Transparent Pixel para iwas "reading '0'" error kung walang in-upload na image
    const transparentPixel = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";

    const getBuf = (f) => new Promise((res) => {
        if (!f) return res(null);
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.readAsArrayBuffer(f);
    });

    function extract(text, label) {
        const regex = new RegExp(label + "\\s*:\\s*(.*)", "i");
        const match = text.match(regex);
        return match ? match[1].trim() : "";
    }

    async function generateDocument() {
    // 1. Kunin muna ang lahat ng inputs mula sa UI
    const template = document.getElementById('tplFile').files[0];
    const rawText = document.getElementById('rawInput').value;
    const sketch = document.getElementById('sketchFile').files[0];
    const signature = document.getElementById('sigFile').files[0];

    // 2. Early Exit: Kung walang template o data, huwag nang ituloy
    if (!template || !rawText) {
        return alert("Kulang ang inputs! Paki-upload ang template at i-paste ang client data.");
    }

    try {
        document.getElementById('status').innerText = "⚙️ Initializing Buffers... March 16, 2026";

        // 3. Sequential Await: Mas safe ito para iwas initialization errors kaysa sa Promise.all
        // Binabasa natin ang files isa-isa para siguradong initialized na sila
        const tBuf = await getFileBuffer(template);
        const skBuf = await getFileBuffer(sketch);
        const siBuf = await getFileBuffer(signature);

        // 4. Setup PizZip at Image Module
        const zip = new PizZip(tBuf);
        const ImgConstructor = window.ImageModule || window.DocxtemplaterImageModule;

        const imgOptions = {
            centered: false,
            // Fallback sa transparent pixel kung walang in-upload na image
            getImage: (tagValue) => tagValue ? tagValue : transparentPixel,
            getSize: (img, tagValue, tagName) => {
                if (tagName === "sketch") return [350, 220];
                if (tagName === "signature") return [160, 80];
                return [10, 10];
            }
        };

        // 5. Initialize Docxtemplater
        const doc = new docxtemplater(zip, {
            modules: [new ImgConstructor(imgOptions)],
            paragraphLoop: true,
            linebreaks: true
        });

        // 6. Data Mapping (March 16, 2026)
        doc.render({
            date: "March 16, 2026",
            last_name: extractData(rawText, "LAST NAME"),
            first_name: extractData(rawText, "FIRST NAME"),
            middle_name: extractData(rawText, "MIDDLE NAME"),
            mobile: extractData(rawText, "MOBILE PHONE"),
            email: extractData(rawText, "EMAIL ADDRESS"),
            id_no: extractData(rawText, "ID TYPE/NO."),
            house_no: extractData(rawText, "HOUSE/BLOCK/UNIT NO."),
            street: extractData(rawText, "STREET"),
            barangay: extractData(rawText, "BARANGAY"),
            municipality: extractData(rawText, "MUNICIPALITY"),
            // Siguradong initialized na ang mga ito dito:
            sketch: skBuf,
            signature: siBuf
        });

        // 7. Generation at Download
        const out = doc.getZip().generate({ 
            type: "blob",
            mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        });

        const clientName = extractData(rawText, "LAST NAME") || "New_Client";
        saveAs(out, `SKYLINE_Application_${clientName}.docx`);
        
        document.getElementById('status').innerText = "✅ SUCCESS: File Ready!";

    } catch (error) {
        console.error("DEBUG ERROR:", error);
        alert("SABLAY: " + error.message);
        document.getElementById('status').innerText = "❌ ERROR: " + error.message;
    }
}
</script>
</body>
</html>
